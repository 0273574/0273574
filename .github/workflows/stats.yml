name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats images
        uses: rahul-jha98/github-stats-transparent@latest
        with:
          username: "0273574"
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ""
          EXCLUDED_REPOS: ""
          COUNT_STATS_FROM_FORKS: false

      - name: Move files
        run: |
          mkdir -p generated
          mv generated/overview.svg generated/overview.svg 2>/dev/null || true
          mv generated/languages.svg generated/languages.svg 2>/dev/null || true

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add generated/
          git diff --staged --quiet || git commit -m "Update stats"
          git push
